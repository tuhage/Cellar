name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Test CellarCore
        working-directory: CellarCore
        run: swift test

      - name: Build all app targets
        run: >-
          xcodebuild
          -project Cellar.xcodeproj
          -scheme Cellar
          -configuration Debug
          -destination 'platform=macOS'
          CODE_SIGNING_ALLOWED=NO
          build
